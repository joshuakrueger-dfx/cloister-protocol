# Build the bilingual (EN + DE) docs site and publish it to Cloudflare Pages
# (project: cloister-docs → docs.cloister-protocol.com). Runs only when docs sources
# change. Stays green before the deploy secret exists: it builds, then skips the
# deploy with a warning until CLOUDFLARE_API_TOKEN is set in repo secrets.
name: docs-deploy

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "docs/en/**"
      - "docs/de/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy docs to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # build.mjs only needs `marked`; install it in isolation (no monorepo install)
      - run: npm install --no-save marked@^18
      - run: node docs-site/build.mjs

      - name: Gate on deploy secret
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "have=${CF_TOKEN:+yes}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.have == 'yes'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "28f3481e24d9d667c1fec4a81a7be789"
        run: npx --yes wrangler@4 pages deploy docs-site/dist --project-name cloister-docs --branch=main

      - name: Note skipped deploy
        if: steps.gate.outputs.have != 'yes'
        run: echo "::warning::CLOUDFLARE_API_TOKEN secret not set — built docs but skipped publish. Add the secret (Cloudflare API token with Account → Cloudflare Pages → Edit) to enable auto-deploy."
