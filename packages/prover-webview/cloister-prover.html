<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloister Prover</title>
    <script src="./snarkjs.min.js"></script>
  </head>
  <body>
    <pre id="status">Cloister WebView Prover — bereit.</pre>
    <script>
      const statusEl = document.getElementById("status");
      const setStatus = (s) => { statusEl.textContent = s; };

      // RN-Bridge (falls in react-native-webview gehostet)
      const toRN = (msg) => {
        if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(msg));
      };

      async function fetchBytes(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error("fetch " + url + " → " + r.status);
        return new Uint8Array(await r.arrayBuffer());
      }

      // Kern: erzeugt einen Groth16-Proof. wasm/zkey als URL (Browser) ODER als Uint8Array (RN).
      window.cloisterProve = async function (witnessInput, wasmSrc, zkeySrc) {
        const t0 = Date.now();
        setStatus("lade Artefakte…");
        const wasm = typeof wasmSrc === "string" ? await fetchBytes(wasmSrc) : new Uint8Array(wasmSrc);
        const zkey = typeof zkeySrc === "string" ? await fetchBytes(zkeySrc) : new Uint8Array(zkeySrc);
        setStatus("erzeuge Proof… (wasm " + (wasm.length / 1024 | 0) + "KB, zkey " + (zkey.length / 1048576).toFixed(1) + "MB)");
        const { proof, publicSignals } = await window.snarkjs.groth16.fullProve(
          witnessInput,
          wasm,
          { type: "mem", data: zkey },
        );
        const ms = Date.now() - t0;
        setStatus("Proof fertig in " + ms + " ms ✅");
        return { proof, publicSignals, ms };
      };

      // RN-Aufruf via postMessage: { id, witnessInput, wasmUrl|wasmB64, zkeyUrl|zkeyB64 }
      const b64ToBytes = (b64) => Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
      async function handle(msg) {
        try {
          const wasmSrc = msg.wasmB64 ? b64ToBytes(msg.wasmB64) : msg.wasmUrl;
          const zkeySrc = msg.zkeyB64 ? b64ToBytes(msg.zkeyB64) : msg.zkeyUrl;
          const out = await window.cloisterProve(msg.witnessInput, wasmSrc, zkeySrc);
          toRN({ id: msg.id, ok: true, ...out });
        } catch (e) {
          setStatus("Fehler: " + e.message);
          toRN({ id: msg.id, ok: false, error: String(e.message || e) });
        }
      }
      // beide Plattformen: window (Android) + document (iOS)
      window.addEventListener("message", (e) => { try { handle(JSON.parse(e.data)); } catch {} });
      document.addEventListener("message", (e) => { try { handle(JSON.parse(e.data)); } catch {} });

      // Selbsttest-Modus: ?selftest=1 → fixture-Witness proven + verifizieren, Ergebnis an RN melden.
      async function selfTest() {
        try {
          const witness = await (await fetch("./fixtures/witness.json")).json();
          const expected = await (await fetch("./fixtures/expected_public.json")).json();
          const out = await window.cloisterProve(witness, "./fixtures/transaction2.wasm", "./fixtures/transaction2_final.zkey");
          const vkey = await (await fetch("./fixtures/verification_key.json")).json();
          const verified = await window.snarkjs.groth16.verify(vkey, out.publicSignals, out.proof);
          const matchesExpected = JSON.stringify(out.publicSignals) === JSON.stringify(expected);
          setStatus("Selbsttest: verified=" + verified + " matchesExpected=" + matchesExpected + " in " + out.ms + " ms " + (verified && matchesExpected ? "✅" : "❌"));
          toRN({ type: "selftest-result", verified, matchesExpected, ms: out.ms });
        } catch (e) {
          setStatus("Selbsttest-Fehler: " + (e.message || e));
          toRN({ type: "selftest-result", verified: false, error: String(e.message || e) });
        }
      }

      toRN({ type: "ready" });
      if (location.search.indexOf("selftest") >= 0) selfTest();
    </script>
  </body>
</html>
