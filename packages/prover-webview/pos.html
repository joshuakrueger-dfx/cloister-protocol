<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloister POS — Base Sepolia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; background: #0b0b0f; color: #fff; text-align: center; padding: 24px; }
      h1 { font-size: 20px; }
      .card { background: #16161c; border-radius: 16px; padding: 24px; max-width: 360px; margin: 16px auto; }
      #qr { background: #fff; padding: 16px; border-radius: 12px; display: inline-block; }
      input { font-size: 22px; width: 120px; text-align: center; padding: 8px; border-radius: 8px; border: none; }
      .muted { color: #888; font-size: 12px; word-break: break-all; margin-top: 12px; }
      button { background: #1769ff; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 15px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h1>Cloister — Kasse (Base Sepolia)</h1>
    <div class="card">
      <div>Betrag (USDC): <input id="amount" type="number" value="250" min="1" /></div>
      <button onclick="render()">QR aktualisieren</button>
      <div style="margin-top:20px"><div id="qr"></div></div>
      <div class="muted" id="link"></div>
      <div class="muted">Mit dem iPhone scannen → „In DFX Wallet öffnen" → zahlt abgeschirmt.</div>
    </div>
    <script>
      // Mac-LAN-IP (per ?lan= überschreibbar). Config-Endpoint des Testnet-Servers.
      const params = new URLSearchParams(location.search);
      const LAN = params.get("lan") || "192.168.178.110";
      const CONFIG = `http://${LAN}:8790/config`;

      function render() {
        const amount = document.getElementById("amount").value || "250";
        const deeplink = `dfxwallet://cloister-pay?config=${encodeURIComponent(CONFIG)}&amount=${amount}`;
        const el = document.getElementById("qr");
        el.innerHTML = "";
        new QRCode(el, { text: deeplink, width: 240, height: 240, correctLevel: QRCode.CorrectLevel.M });
        document.getElementById("link").textContent = deeplink;
      }
      render();
    </script>
  </body>
</html>
