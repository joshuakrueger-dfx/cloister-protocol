<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloister Pay</title>
    <script src="./snarkjs.min.js"></script>
    <script src="./cloister-sdk.browser.js"></script>
  </head>
  <body style="font-family: -apple-system, sans-serif; padding: 16px;">
    <pre id="status">Cloister Pay — bereit.</pre>
    <script>
      const SDK = window.CloisterSDK;
      const statusEl = document.getElementById("status");
      const setStatus = (s) => { statusEl.textContent = s; console.log(s); };
      const toRN = (m) => { if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(m)); };
      const q = new URLSearchParams(location.search);

      // Feste Test-App-Identität — MUSS mit preshield/server APP_SCALAR übereinstimmen.
      const APP_SCALAR = 1234567890123456789n;

      // Jeder Netz-Call bekommt ein hartes Timeout — sonst kann ein hängender
      // RPC/Relayer den ganzen Pay-Flow blockieren. Bei Abbruch wirft fetch,
      // die pay()-Catch postet einen klaren Fehler an die App zurück.
      async function fetchWithTimeout(url, opts = {}, ms = 15000) {
        const ctrl = new AbortController();
        const id = setTimeout(() => ctrl.abort(), ms);
        try {
          return await fetch(url, { ...opts, signal: ctrl.signal });
        } catch (e) {
          if (e.name === "AbortError") throw new Error("Zeitüberschreitung: " + url);
          throw e;
        } finally {
          clearTimeout(id);
        }
      }

      async function fetchBytes(url) {
        const r = await fetchWithTimeout(url, {}, 30000);
        if (!r.ok) throw new Error("fetch " + url + " → " + r.status);
        return new Uint8Array(await r.arrayBuffer());
      }

      async function pay() {
        try {
          if (!SDK) throw new Error("CloisterSDK nicht geladen");
          const configUrl = q.get("config");
          const amount = BigInt(q.get("amount") || "250");
          setStatus("hole Config…");
          const cfg = await (await fetchWithTimeout(configUrl)).json();

          setStatus("synce Notes vom Indexer…");
          const indexerBase = cfg.indexer.replace(/\/commitments$/, "");
          const kp = await SDK.Keypair.create(APP_SCALAR);
          const tree = await new SDK.MerkleTree().init();
          const wallet = new SDK.ShieldedWallet(kp, tree, "app");
          await SDK.syncFromIndexer(indexerBase, tree, [wallet]);

          // bereits ausgegebene Nullifier holen → erste UNBENUTZTE Note wählen
          const spent = new Set((await (await fetchWithTimeout(indexerBase + "/nullifiers")).json()).nullifiers);
          let note = null;
          for (const n of wallet.spendable()) {
            const { pathIndices } = await tree.path(n.index);
            const nf = (await SDK.noteNullifier(await n.note.commitment(), pathIndices, kp.privateKey)).toString();
            if (!spent.has(nf)) { note = n; break; }
          }
          if (!note) throw new Error("keine unbenutzte Note — erst shielden");

          setStatus("baue Pay-Proof (Betrag " + amount + ")…");
          const dfxPub = BigInt(cfg.dfxShieldAddress.pubKey);
          const w = await SDK.buildWitness({
            tree,
            lane: note.lane || 0,
            inputs: [{ note: note.note, privateKey: kp.privateKey, index: note.index }],
            outputs: [
              { note: new SDK.Note({ amount, pubKey: dfxPub }), encPubKey: cfg.dfxShieldAddress.encPubKey },
              { note: new SDK.Note({ amount: note.note.amount - amount, pubKey: kp.publicKey }), encPubKey: kp.address().encPubKey },
            ],
            extAmount: 0n,
          });
          const wasm = await fetchBytes("./fixtures/transaction2.wasm");
          const zkey = await fetchBytes("./fixtures/transaction2_final.zkey");
          const t0 = Date.now();
          const { proof, publicSignals } = await window.snarkjs.groth16.fullProve(w.witnessInput, wasm, { type: "mem", data: zkey });
          const ms = Date.now() - t0;

          setStatus("Proof fertig (" + ms + " ms) — sende an Relayer…");
          const body = {
            proof: SDK.toSolidityProof(proof),
            root: w.root, newRoot: w.newRoot,
            inputNullifiers: w.inputNullifiers, outputCommitments: w.outputCommitments,
            extData: w.extData,
          };
          const r = await fetchWithTimeout(cfg.relayer, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) }, 30000);
          const out = await r.json();
          if (!r.ok) throw new Error(out.error || "relayer error");
          setStatus("✅ Bezahlt!\nTx: " + out.txHash + "\n" + out.scan);
          toRN({ type: "paid", ok: true, txHash: out.txHash, scan: out.scan, ms });
        } catch (e) {
          setStatus("❌ Fehler: " + (e.message || e));
          toRN({ type: "paid", ok: false, error: String(e.message || e) });
        }
      }

      toRN({ type: "ready" });
      if (q.has("auto")) pay();
      window.cloisterPay = pay;
    </script>
  </body>
</html>
