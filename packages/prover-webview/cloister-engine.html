<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloister Engine</title>
    <script src="./snarkjs.min.js"></script>
    <script src="./cloister-sdk.browser.js"></script>
  </head>
  <body>
    <pre id="status">Cloister Engine — lädt…</pre>
    <script>
      const SDK = window.CloisterSDK;
      const statusEl = document.getElementById("status");
      const setStatus = (s) => { statusEl.textContent = s; };
      const toRN = (m) => { if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify(m)); };

      async function fetchBytes(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error("fetch " + url + " → " + r.status);
        return new Uint8Array(await r.arrayBuffer());
      }

      // Baut den Witness IN der Engine (SDK) und erzeugt+gibt den Proof zurück.
      // params: { keys:{privateKey, encPubKey?}, txParams } — für M2-Selbsttest reicht der Shield.
      window.cloisterProveTx = async function (witnessInput, wasmUrl, zkeyUrl) {
        const wasm = await fetchBytes(wasmUrl);
        const zkey = await fetchBytes(zkeyUrl);
        const { proof, publicSignals } = await window.snarkjs.groth16.fullProve(witnessInput, wasm, { type: "mem", data: zkey });
        return { proof: SDK.toSolidityProof(proof), publicSignals };
      };

      // Selbsttest: Engine baut Witness (Shield 1000) + Proof + Verify — alles im Browser/WebView.
      async function selfTest() {
        try {
          if (!SDK) throw new Error("CloisterSDK nicht geladen");
          setStatus("Engine: baue Keys + Note + Witness…");
          const tree = await new SDK.MerkleTree().init();
          const alice = await SDK.Keypair.create();
          const note = new SDK.Note({ amount: 1000n, pubKey: alice.publicKey });
          const w = await SDK.buildWitness({
            tree,
            inputs: [],
            outputs: [{ note, encPubKey: alice.address().encPubKey }],
            extAmount: 1000n,
          });
          setStatus("Engine: erzeuge Proof…");
          const t0 = Date.now();
          const wasm = await fetchBytes("./fixtures/transaction2.wasm");
          const zkey = await fetchBytes("./fixtures/transaction2_final.zkey");
          const { proof, publicSignals } = await window.snarkjs.groth16.fullProve(w.witnessInput, wasm, { type: "mem", data: zkey });
          const ms = Date.now() - t0;
          const vkey = await (await fetch("./fixtures/verification_key.json")).json();
          const verified = await window.snarkjs.groth16.verify(vkey, publicSignals, proof);
          // Sanity: publicSignals[5]/[6] sind die Output-Commitments aus dem Witness
          const built = publicSignals[5] === w.outputCommitments[0] && publicSignals[6] === w.outputCommitments[1];
          setStatus("Engine-Selbsttest: builtInEngine=" + built + " verified=" + verified + " in " + ms + " ms " + (built && verified ? "✅" : "❌"));
          toRN({ type: "engine-selftest", builtInEngine: built, verified, ms });
        } catch (e) {
          setStatus("Engine-Fehler: " + (e.message || e));
          toRN({ type: "engine-selftest", verified: false, error: String(e.message || e) });
        }
      }

      toRN({ type: "ready" });
      if (location.search.indexOf("selftest") >= 0) selfTest();
    </script>
  </body>
</html>
